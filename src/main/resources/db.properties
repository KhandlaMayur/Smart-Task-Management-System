# =========================================
# DATABASE CONFIGURATION
# =========================================

db.driver=com.mysql.cj.jdbc.Driver

db.url=jdbc:mysql://localhost:3306/smart_task_management

db.username=root

db.password=

# =========================================
# MYSQL SETTINGS
# =========================================

db.useSSL=false

db.allowPublicKeyRetrieval=true

db.serverTimezone=UTC

# =========================================
# CONNECTION POOL SETTINGS
# =========================================

db.initialPoolSize=5

db.maxPoolSize=20

db.connectionTimeout=30000

# =========================================
# APPLICATION SETTINGS
# =========================================

app.name=Smart Task Management System

app.version=1.0

app.upload.path=uploads/

app.default.profile.image=default.png