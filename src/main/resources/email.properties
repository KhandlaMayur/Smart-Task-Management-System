# =========================================
# EMAIL DELIVERY CONFIGURATION
# =========================================

# Set true after you configure the Gmail SMTP values below.
email.enabled=false

# Gmail SMTP typically uses smtp.gmail.com and an app password.
email.smtp.host=smtp.gmail.com
email.smtp.port=465
email.smtp.username=
email.smtp.password=

# Leave blank to reuse the SMTP username as the sender.
email.from=
